<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anniversary ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #fff0f3; text-align: center; font-family: 'Arial', sans-serif; color: #ff4d6d; padding: 50px 20px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .days-box { font-size: 2.5rem; font-weight: bold; margin: 20px 0; color: #ff1a4d; }
        p { font-size: 1.1rem; color: #555; line-height: 1.6; }
        .btn { background: #ff4d6d; color: white; border: none; padding: 12px 25px; border-radius: 30px; font-size: 1rem; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Happy Anniversary ⸝⸝☘︎</h1>
        <div class="days-box" id="counter">นับถอยหลัง...</div>
        <p>ขอบคุณที่เป็นเรื่องราวดีๆ ในชีวิตนะ<br>รักที่สุดเลย!</p>
        <button class="btn" onclick="celebrate()">คลิกดูเซอร์ไพรส์!</button>
    </div>

    <script>
        // --- ส่วนคำนวณวัน ---
        // เปลี่ยนวันที่ตรงนี้เป็นวันที่เริ่มคบกัน )
        const startDate = new Date('2026-01-26'); 
        const today = new Date(2026-04-26);
        const diffTime = Math.abs(today - startDate);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
        document.getElementById('counter').innerText = diffDays + " วัน";

        // --- ส่วนพลุกระดาษ ---
        function celebrate() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff4d6d', '#ffafcc', '#ff1a4d']
            });
        }
        // ให้พลุระเบิดตอนเปิดหน้าเว็บด้วย
        window.onload = celebrate;
    </script>
</body>
</html>
